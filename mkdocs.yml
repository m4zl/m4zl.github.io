site_name: Mazl`s Knowledgebase
site_url: https://m4zl.github.io/
theme: 
  name: readthedocs
  features:
  highlightjs: true
  include_homepage_in_sidebar: false
  prev_next_buttons_location: none
  collapse_navigation: false
  titles_only: false
  sticky_navigation: true
  navigation_depth: 4
  hljs_languages:
    - yaml
    - rust
    - powershell
    - DOS
  locale: de

markdown_extensions:
  - toc:
      permalink: "⚓"

nav:
  - home: 'index.md'
  - 'knowledgebase':
    - 'microsoft': 
      - 'office': 'kb/ms/msoffice.md'
    - 'dell':
      - 'dockingstationen': 'kb/dell/delldocks.md'
  - 'about': 'about.md'